
services:
  app:
    build: .
    container_name: gold_stack_api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine
    container_name: gold_stack_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gold_stack
    ports:
      - "5434:5432"